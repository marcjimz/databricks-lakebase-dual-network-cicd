name: Lakebase Dual-Network Deploy

# Deploys the Lakebase autoscaling bundle. Before the normal `bundle deploy`, a
# pre-hook provisions the instance the legacy way (if missing) and binds the
# autoscaling resources to it — automating the manual cutover.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  # OAuth service principal (M2M). Configure these as repository secrets:
  #   DATABRICKS_HOST           e.g. https://<workspace>.cloud.databricks.com
  #   DATABRICKS_CLIENT_ID      service principal application (client) id
  #   DATABRICKS_CLIENT_SECRET  service principal OAuth secret
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
  BUNDLE_TARGET: dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI (v1.2.0+)
        uses: databricks/setup-cli@main

      - name: Show CLI version
        run: databricks --version

      # --- Network prerequisite: allow THIS runner's IP (just-in-time) ------ #
      # If the workspace enforces IP access lists, the GitHub-hosted runner must
      # be allowlisted or every workspace API call (pre-hook + bundle deploy) is
      # rejected. GitHub publishes ~7,000+ rotating Actions CIDRs, but the
      # Databricks IP ACL API caps at 1,000 values combined — so we cannot add
      # the full meta ranges. Instead we allowlist ONLY this run's public IP as a
      # single /32, then remove it in an always() cleanup step below.
      #
      # Requires a service principal with admin rights to manage IP access lists.
      # If your workspace does not enforce IP ACLs, delete this step and the
      # cleanup step.
      - name: Allowlist this runner's IP
        id: allowlist
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner public IP: $RUNNER_IP"

          # IP access lists have no effect until the feature is enabled (idempotent).
          databricks workspace-conf set-status \
            --json '{"enableIpAccessLists": "true"}' || true

          LABEL="gha-${GITHUB_RUN_ID}"
          RESP=$(databricks ip-access-lists create "$LABEL" ALLOW \
            --json "{\"ip_addresses\":[\"${RUNNER_IP}/32\"]}" -o json)
          echo "$RESP"
          LIST_ID=$(echo "$RESP" | jq -r '.ip_access_list.list_id // .list_id')
          echo "list_id=$LIST_ID" >> "$GITHUB_OUTPUT"
          echo "Created ALLOW list $LIST_ID ($LABEL) for ${RUNNER_IP}/32."

          # ACL changes can take a moment to propagate to the data plane.
          sleep 20

      - name: Validate bundle
        run: databricks bundle validate -t "$BUNDLE_TARGET"

      # --- Pre-hook: the 3 manual steps, automated ------------------------- #
      # Step 1  create the instance the legacy provisioned way (if missing)
      # Step 2  bind the autoscaling resource keys to that instance
      # (no unbind needed — the instance is never a `database_instances` resource)
      - name: Pre-hook — provision (legacy) + bind
        run: python3 scripts/lakebase_prehook.py --target "$BUNDLE_TARGET"

      # --- Natural CI/CD: deploy the autoscaling bundle directly ----------- #
      # Reconciles the bound instance and CREATES any new branches (feature-x).
      - name: Deploy bundle
        run: databricks bundle deploy -t "$BUNDLE_TARGET"

      # --- Optional verification ------------------------------------------- #
      - name: Verify branches
        run: |
          PROJECT=$(databricks bundle validate -t "$BUNDLE_TARGET" -o json \
            | python3 -c "import json,sys,re; c=json.load(sys.stdin); \
              p=next(iter(c['resources']['postgres_projects'].values()))['project_id']; \
              v=c.get('variables',{}); \
              print(re.sub(r'\$\{var\.([A-Za-z_][A-Za-z0-9_]*)\}', lambda m: str(v.get(m.group(1),{}).get('value', v.get(m.group(1),{}).get('default',''))), p))")
          echo "Branches for project $PROJECT:"
          databricks postgres list-branches "projects/$PROJECT"

      # --- Cleanup: always remove this run's IP allowlist entry ------------- #
      # Runs even if an earlier step failed, so we never leave stale /32 ALLOW
      # lists (and their transient IPs) accumulating on the workspace.
      - name: Remove this runner's IP allowlist
        if: always() && steps.allowlist.outputs.list_id != ''
        run: |
          echo "Deleting ALLOW list ${{ steps.allowlist.outputs.list_id }} ..."
          databricks ip-access-lists delete "${{ steps.allowlist.outputs.list_id }}" \
            && echo "Removed." || echo "Delete failed (may already be gone) — continuing."
